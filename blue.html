<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>"Relative" #1 (Blue) - Audio Player</title>
  <link rel="stylesheet" href="./styles.css">
</head>

<body class="blue">
  <div class="outer"></div>
  <div class="container">
    <h2>"Relative" #1 (Blue)</h2>
    <ol class="instruction">
      <li>Crouch under the desk.</li>
      <li>Press play.</li>
    </ol>
    <div class="warning">
      <p class="warning-title">Trigger Warning</p>
      <p class="warning-body">This audio contains sounds of domestic conflict.</p>
    </div>

    <a href="./blue-description.html">See the description</a>

    <div class="visualizer" id="viz"></div>

    <button class="play-btn" id="playBtn" onclick="togglePlay()">
      <div class="pulse"></div>
      <div class="icon-play"></div>
      <div class="icon-pause"><span></span><span></span></div>
    </button>
    <p class="status" id="status">TAP TO PLAY</p>
  </div>

  <audio id="audio" src="blue.mp3" loop></audio>

  <script src="./scripts.js"></script>
</body>

</html>
